<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Dark - Task Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: flex-start; padding: 40px 0; min-height: 100vh; }
  .phone-frame { width: 390px; height: 844px; background: #121212; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.4); border: 8px solid #000; display: flex; flex-direction: column; }
  .status-bar { height: 54px; padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; color: #E0E0E0; flex-shrink: 0; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .login-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 32px; gap: 32px; }
  .login-header { text-align: center; }
  .login-icon { width: 72px; height: 72px; background: #6366F1; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .login-icon .material-icons-round { font-size: 40px; color: white; }
  .login-header h1 { font-size: 28px; font-weight: 700; color: #F3F4F6; margin-bottom: 8px; }
  .login-header p { font-size: 15px; color: #9CA3AF; }
  .form-group { display: flex; flex-direction: column; gap: 16px; }
  .input-field { background: #1E1E1E; border: 1.5px solid #2A2A2A; border-radius: 10px; padding: 14px 16px; font-size: 15px; font-family: 'Inter', sans-serif; color: #F3F4F6; outline: none; }
  .input-field::placeholder { color: #6B7280; }
  .input-wrapper { position: relative; }
  .input-wrapper .material-icons-round { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #6B7280; font-size: 22px; }
  .forgot-password { text-align: right; font-size: 13px; color: #818CF8; font-weight: 500; text-decoration: none; margin-top: -8px; display: block; }
  .sign-in-btn { background: #6366F1; color: white; border: none; border-radius: 10px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .sign-up-link { text-align: center; font-size: 14px; color: #9CA3AF; }
  .sign-up-link a { color: #818CF8; font-weight: 600; text-decoration: none; }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><div class="status-icons"><span class="material-icons-round" style="font-size:17px">signal_cellular_alt</span><span class="material-icons-round" style="font-size:17px">wifi</span><span class="material-icons-round" style="font-size:17px">battery_full</span></div></div>
  <div class="login-content">
    <div class="login-header"><div class="login-icon"><span class="material-icons-round">task_alt</span></div><h1>Welcome Back</h1><p>Sign in to continue</p></div>
    <div class="form-group">
      <input type="email" class="input-field" placeholder="Email" value="john@example.com">
      <div class="input-wrapper"><input type="password" class="input-field" style="width:100%" placeholder="Password" value="password123"><span class="material-icons-round">visibility_off</span></div>
      <a href="#" class="forgot-password">Forgot Password?</a>
      <button class="sign-in-btn">Sign In</button>
    </div>
    <div class="sign-up-link">Don't have an account? <a href="#">Sign Up</a></div>
  </div>
</div>
</body>
</html>
