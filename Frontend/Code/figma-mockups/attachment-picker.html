<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attachment Picker - Task Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #E5E7EB; display: flex; justify-content: center; align-items: flex-start; padding: 40px 0; min-height: 100vh; }
  .phone-frame { width: 390px; height: 844px; background: #F9FAFB; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.15); border: 8px solid #1a1a1a; display: flex; flex-direction: column; }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: flex-end; z-index: 10; }
  .picker-sheet { background: white; border-radius: 24px 24px 0 0; padding: 24px; }
  .sheet-handle { width: 36px; height: 4px; background: #D1D5DB; border-radius: 2px; margin: 0 auto 20px; }
  .sheet-title { font-size: 17px; font-weight: 600; color: #111827; margin-bottom: 20px; text-align: center; }
  .picker-options { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; }
  .picker-option { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
  .picker-icon { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
  .picker-icon .material-icons-round { font-size: 28px; color: white; }
  .picker-label { font-size: 12px; font-weight: 500; color: #374151; }
  .cancel-btn { width: 100%; padding: 14px; border-radius: 10px; background: #F3F4F6; border: none; font-size: 15px; font-weight: 600; color: #6B7280; font-family: 'Inter', sans-serif; cursor: pointer; margin-bottom: 16px; }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
<div class="phone-frame">
  <div class="overlay">
    <div class="picker-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Attach File</div>
      <div class="picker-options">
        <div class="picker-option">
          <div class="picker-icon" style="background:#3B82F6"><span class="material-icons-round">photo_camera</span></div>
          <span class="picker-label">Camera</span>
        </div>
        <div class="picker-option">
          <div class="picker-icon" style="background:#8B5CF6"><span class="material-icons-round">photo_library</span></div>
          <span class="picker-label">Gallery</span>
        </div>
        <div class="picker-option">
          <div class="picker-icon" style="background:#6366F1"><span class="material-icons-round">description</span></div>
          <span class="picker-label">Document</span>
        </div>
        <div class="picker-option">
          <div class="picker-icon" style="background:#10B981"><span class="material-icons-round">cloud_upload</span></div>
          <span class="picker-label">Cloud</span>
        </div>
      </div>
      <button class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
