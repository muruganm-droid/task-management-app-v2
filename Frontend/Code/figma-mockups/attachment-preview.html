<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attachment Preview - Task Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #E5E7EB; display: flex; justify-content: center; align-items: flex-start; padding: 40px 0; min-height: 100vh; }
  .phone-frame { width: 390px; height: 844px; background: #000; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.15); border: 8px solid #1a1a1a; display: flex; flex-direction: column; }
  .status-bar { height: 54px; padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; color: white; flex-shrink: 0; z-index: 2; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .preview-bar { padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 2; }
  .preview-bar .material-icons-round { font-size: 24px; color: white; }
  .preview-bar h2 { font-size: 16px; font-weight: 600; color: white; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-actions { display: flex; gap: 16px; }
  .image-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .placeholder-image { width: 340px; height: 420px; background: linear-gradient(135deg, #1E293B, #334155); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .placeholder-image .material-icons-round { font-size: 64px; color: #64748B; }
  .placeholder-image span { font-size: 14px; color: #94A3B8; }
  .file-info-bar { padding: 16px; background: rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.1); z-index: 2; display: flex; align-items: center; gap: 12px; }
  .file-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(99,102,241,0.2); display: flex; align-items: center; justify-content: center; }
  .file-icon .material-icons-round { font-size: 22px; color: #818CF8; }
  .file-details { flex: 1; }
  .file-name { font-size: 13px; font-weight: 600; color: white; }
  .file-meta { font-size: 11px; color: #94A3B8; margin-top: 2px; }
  .home-indicator { width: 134px; height: 5px; background: white; border-radius: 3px; margin: 8px auto 8px; }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><div class="status-icons"><span class="material-icons-round" style="font-size:17px">signal_cellular_alt</span><span class="material-icons-round" style="font-size:17px">wifi</span><span class="material-icons-round" style="font-size:17px">battery_full</span></div></div>
  <div class="preview-bar">
    <span class="material-icons-round">close</span>
    <h2>wireframe-v2.png</h2>
    <div class="preview-actions"><span class="material-icons-round">share</span><span class="material-icons-round">download</span><span class="material-icons-round">delete</span></div>
  </div>
  <div class="image-container">
    <div class="placeholder-image"><span class="material-icons-round">image</span><span>Image Preview</span></div>
  </div>
  <div class="file-info-bar">
    <div class="file-icon"><span class="material-icons-round">image</span></div>
    <div class="file-details"><div class="file-name">wireframe-v2.png</div><div class="file-meta">PNG · 2.4 MB · Uploaded by John Doe</div></div>
  </div>
  <div class="home-indicator"></div>
</div>
</body>
</html>
