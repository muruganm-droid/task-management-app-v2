<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Task - Task Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #E5E7EB; display: flex; justify-content: center; align-items: flex-start; padding: 40px 0; min-height: 100vh; }

  .phone-frame {
    width: 390px; height: 844px; background: #F9FAFB; border-radius: 40px;
    overflow: hidden; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    border: 8px solid #1a1a1a; display: flex; flex-direction: column;
  }
  .status-bar { height: 54px; padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; color: #111827; flex-shrink: 0; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .app-bar { padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .app-bar .material-icons-round { font-size: 24px; color: #111827; }
  .app-bar h2 { font-size: 18px; font-weight: 600; color: #111827; flex: 1; }
  .create-btn { background: #6366F1; color: white; border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 600; font-family: 'Inter'; }

  .content { flex: 1; padding: 16px 20px; }

  .input-group { margin-bottom: 20px; }
  .input-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .required { color: #EF4444; }
  .input-field { width: 100%; background: white; border: 1.5px solid #E5E7EB; border-radius: 10px; padding: 12px 14px; font-size: 14px; font-family: 'Inter', sans-serif; color: #111827; outline: none; }
  .input-field::placeholder { color: #9CA3AF; }
  textarea.input-field { height: 100px; resize: none; line-height: 1.5; }

  .date-picker { width: 100%; background: white; border: 1.5px solid #E5E7EB; border-radius: 10px; padding: 12px 14px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .date-picker .material-icons-round { font-size: 20px; color: #6B7280; }

  .options { display: flex; gap: 8px; flex-wrap: wrap; }
  .option-chip { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 1.5px solid #E5E7EB; background: white; color: #6B7280; }
  .option-chip.active-todo { background: #F3F4F6; color: #6B7280; border-color: #6B7280; }
  .option-chip.active-medium { background: #FFFBEB; color: #F59E0B; border-color: #F59E0B; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><div class="status-icons"><span class="material-icons-round" style="font-size:17px">signal_cellular_alt</span><span class="material-icons-round" style="font-size:17px">wifi</span><span class="material-icons-round" style="font-size:17px">battery_full</span></div></div>
  <div class="app-bar"><span class="material-icons-round">close</span><h2>New Task</h2><button class="create-btn">Create</button></div>
  <div class="content">
    <div class="input-group"><div class="input-label">Title <span class="required">*</span></div><input type="text" class="input-field" value="Setup CI/CD pipeline"></div>
    <div class="input-group"><div class="input-label">Description</div><textarea class="input-field">Configure GitHub Actions for automated build, test, and deployment pipeline. Include staging and production environments.</textarea></div>
    <div class="input-group"><div class="input-label">Status</div><div class="options"><div class="option-chip active-todo">To Do</div><div class="option-chip">In Progress</div><div class="option-chip">Under Review</div><div class="option-chip">Done</div></div></div>
    <div class="input-group"><div class="input-label">Priority</div><div class="options"><div class="option-chip">Low</div><div class="option-chip active-medium">Medium</div><div class="option-chip">High</div><div class="option-chip">Critical</div></div></div>
    <div class="input-group"><div class="input-label">Due Date</div><div class="date-picker"><span class="material-icons-round">calendar_today</span><span>Mar 29, 2026</span></div></div>
  </div>
</div>
</body>
</html>
